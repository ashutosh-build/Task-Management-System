# ── Server ──────────────────────────────────────────────────
server.port=8080

# ── H2 Database ─────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:taskflowdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ── JPA / Hibernate ─────────────────────────────────────────
# H2Dialect auto-detected by Hibernate - no need to specify
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ── JWT ─────────────────────────────────────────────────────
jwt.secret=ZmFsbGJhY2stc2VjcmV0LWtleS10YXNrZmxvdy1hcHAtMjAyNC1tdXN0LWJlLWF0LWxlYXN0LTI1Ni1iaXRz
jwt.expiration=86400000

# ── Jackson ─────────────────────────────────────────────────
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# ── Logging ─────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.taskflow=INFO
logging.level.org.springframework.security=WARN
